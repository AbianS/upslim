name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-progress releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Check for pending changesets
      - name: Check for changesets
        id: check
        run: |
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md | wc -l | tr -d ' ')
          if [ "$CHANGESETS" -eq "0" ]; then
            echo "has_changesets=false" >> $GITHUB_OUTPUT
            echo "No changesets — this may be a version commit"
          else
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            echo "Found $CHANGESETS changeset(s)"
          fi

      # If there ARE changesets → create/update the version PR
      - name: Create Release Pull Request
        if: steps.check.outputs.has_changesets == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      # If there are NO changesets → the version PR was merged, create releases
      - name: Create GitHub releases
        if: steps.check.outputs.has_changesets == 'false'
        run: |
          # Server release — version from Cargo.toml
          SERVER_VERSION=$(grep '^version' packages/server/Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          SERVER_TAG="upslim-server@${SERVER_VERSION}"

          if ! git tag -l | grep -q "^${SERVER_TAG}$"; then
            echo "Creating release for ${SERVER_TAG}"
            git tag "$SERVER_TAG"
            git push origin "$SERVER_TAG"
            gh release create "$SERVER_TAG" \
              --title "upslim-server v${SERVER_VERSION}" \
              --notes "Release of upslim-server version ${SERVER_VERSION}" \
              --latest=true
          else
            echo "Tag ${SERVER_TAG} already exists, skipping"
          fi

          # Docs release — version from packages/docs/package.json
          DOCS_VERSION=$(node -p "require('./packages/docs/package.json').version")
          DOCS_TAG="docs@${DOCS_VERSION}"

          if ! git tag -l | grep -q "^${DOCS_TAG}$"; then
            echo "Creating release for ${DOCS_TAG}"
            git tag "$DOCS_TAG"
            git push origin "$DOCS_TAG"
            gh release create "$DOCS_TAG" \
              --title "docs v${DOCS_VERSION}" \
              --notes "Deploy docs v${DOCS_VERSION} to GitHub Pages" \
              --latest=false
          else
            echo "Tag ${DOCS_TAG} already exists, skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
