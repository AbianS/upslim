name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/server -> target

      - name: Check formatting
        run: cd packages/server && cargo fmt --check

      - name: Clippy
        run: cd packages/server && cargo clippy -- -D warnings

      - name: Run tests
        run: cd packages/server && cargo test

      - name: Build release
        run: cd packages/server && cargo build --release --bin upslim-server
